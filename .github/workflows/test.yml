name: NewPipeline
on:
  workflow_dispatch:
jobs:
  Git_Commands:
    name: Git Commands
    runs-on: ubuntu-latest
    steps:
    - name: echo message
      run: echo Executing Git commands...
    - name: checkout
      uses: actions/checkout@v4.1.0
      with:
        repository: DaggupatiPavan/java-web-app-docker
    - name: sh
      shell: bash
      run: ls
  Build:
    runs-on: ubuntu-latest
    needs: Git_Commands
    steps:
    - name: echo message
      run: echo Building the application...
    - name: checkout
      uses: actions/checkout@v4.1.0
      with:
        repository: DaggupatiPavan/java-web-app-docker
    - name: sh
      shell: bash
      run: mvn clean package
  Run_Shell_Commands:
    name: Run Shell Commands
    runs-on: ubuntu-latest
    needs: Build
    steps:
    - name: Echo message for loop
      shell: bash
      continue-on-error: true
      run: |
        for i in {1..6}; do
          echo "Running shell command #$i"
        done


  Echo_Messages:
    name: Echo Messages
    runs-on: ubuntu-latest
    needs: Run_Shell_Commands
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
#     # 'script' was not transformed because there is no suitable equivalent in GitHub Actions
#     - name: script
#       arguments:
#       - key: scriptBlock
#         value:
#           isLiteral: true
#           value: |-
#             for (int i = 0; i < 19; i++) {
#                                     echo "Echo message #${i + 1}"
#                                 }
  Archive_Artifacts:
    name: Archive Artifacts
    runs-on: ubuntu-latest
    needs: Echo_Messages
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4.1.0
      if: always()
      with:
        path: "**/target/*.war"
  Clean_Workspace:
    name: Clean Workspace
    runs-on: ubuntu-latest
    needs: Archive_Artifacts
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: clean workspace
      shell: bash
      run: rm -rf ${{ github.workspace }}/*
  Post-Build:
    if: always()
    name: Post Build
    runs-on: ubuntu-latest
    needs:
    - Git_Commands
    - Build
    - Run_Shell_Commands
    - Echo_Messages
    - Archive_Artifacts
    - Clean_Workspace
    steps:
    - name: echo message
      run: echo Pipeline execution completed.
      if: always()
