  send-logs-to-s3:
    runs-on: self-hosted
    steps:
      - name: send console logs to s3
        run: |
          curl -L \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${OWNER}/${REPO}/actions/jobs/${GITHUB_JOB_ID}
          
